<div class="teams-calendar-wrapper">

  <button
    class="reopen-sidebar-btn"
    *ngIf="!sidebarOpen()"
    (click)="sidebarOpen.set(true)"
    title="Abrir calendario lateral"
    aria-label="Abrir calendario lateral">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Calendario
  </button>

  <!-- SIDEBAR -->
  <aside class="sidebar" [class.collapsed]="!sidebarOpen()">
    <div class="sidebar-header">
      <span class="sidebar-title">Calendario</span>
    </div>

    <button class="new-event-btn" (click)="openNewEventModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Nuevo evento
    </button>

    <!-- Mini Navigator -->
    <div class="mini-nav-wrapper">
      <daypilot-navigator
        #navigator
        [config]="navigatorConfig"
        [date]="selectedDate()">
      </daypilot-navigator>
    </div>

    <button
      class="close-sidebar-btn"
      (click)="sidebarOpen.set(false)"
      title="Cerrar calendario lateral"
      aria-label="Cerrar calendario lateral">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
      Cerrar
    </button>


  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-area">

    <!-- TOOLBAR -->
    <header class="toolbar">
      <div class="toolbar-left">
        <button class="today-btn" (click)="goToday()">Hoy</button>
        <div class="nav-arrows">
          <button class="arrow-btn" (click)="navigate(-1)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <button class="arrow-btn" (click)="navigate(1)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>
        <h2 class="date-range-title">{{ headerTitle }}</h2>
      </div>

      <div class="toolbar-right">
        <div class="view-switcher">
          <button
            *ngFor="let v of ['Day', 'Week', 'Month']"
            class="view-btn"
            [class.active]="currentView() === v"
            (click)="switchView($any(v))">
            {{ v === 'Day' ? 'Día' : v === 'Week' ? 'Semana' : 'Mes' }}
          </button>
        </div>
        <button class="new-event-icon-btn" (click)="openNewEventModal()" title="Nuevo evento">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- CALENDAR VIEWS -->
    <div class="calendar-container">
      <daypilot-calendar
        #dayPilotCalendar
        *ngIf="currentView() !== 'Month'"
        [config]="calendarConfig">
      </daypilot-calendar>

      <daypilot-month
        #dayPilotMonth
        *ngIf="currentView() === 'Month'"
        [config]="monthConfig">
      </daypilot-month>
    </div>
  </main>
</div>

<!-- LOADING & ERROR OVERLAYS -->
<app-loading *ngIf="isLoading()"></app-loading>
<app-error
  *ngIf="errorMsg()"
  [mensaje]="errorMsg()!"
  (retry)="cargarReservas()">
</app-error>

<!-- NEW EVENT MODAL -->
<app-nuevo-evento-modal
  [showModal]="showEventModal()"
  [isSaving]="isSavingEvent()"
  [errorMsg]="modalError()"
  [initialStart]="newEventStart()"
  [initialEnd]="newEventEnd()"
  (save)="onSaveNewEvent($event)"
  (close)="showEventModal.set(false)">
</app-nuevo-evento-modal>

<!-- EVENT DETAIL MODAL -->
<app-detalle-evento-modal
  [showModal]="showEventDetail()"
  [selectedEvent]="selectedEvent"
  (edit)="openEditarReserva()"
  (delete)="onDeleteEvent()"
  (close)="showEventDetail.set(false)">
</app-detalle-evento-modal>

<!-- EDITAR RESERVA -->
<app-editar-reserva
  *ngIf="showEditarReserva() && reservaParaEditar()"
  [reserva]="reservaParaEditar()!"
  (guardado)="onReservaGuardada($event)"
  (cancelado)="onEditarCancelado()">
</app-editar-reserva>
